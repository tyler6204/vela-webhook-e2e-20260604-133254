# Prometheus reads this file from the repo root at .shipd/task.toml.
# Start here. This file tells Prometheus where the instructions, setup script,
# private verifier, reference patch, and rubric live.

[proposal]
# Human-readable task name. Usually this is copied from your Shipd submission.
title = "This is a test"

# Task category. Usually copied from Shipd. Leave it alone unless it is clearly wrong.
family = "training_debugger"

# Where the idea came from: paper, public_repo, issue, design_doc, etc.
source_type = "public_repo"

# Link to the paper, issue, repo, or doc that inspired the task.
source_url = "TODO: add source paper, issue, or repo URL"

# Rough effort estimate for a strong solver. Use text, not a number you have to justify.
estimated_solver_time = "TODO: e.g. 2-4 hours, 1 day, or unknown"

# Plain-English task summary.
description = """
This is a test
"""

# Why this task is worth reviewing. This used to be called "signal"; it means
# the evidence that a solution is real and useful, not just cosmetic.
why_this_matters = """
This is a test
"""

[workspace]
# Keep "." for v0. The repo itself is the workspace.
root = "."

[agent]
# Solver-facing instructions. This is the main file the solver reads.
instruction = ".shipd/instruction.md"

# Files/folders Prometheus should hide from solvers. private/ is for reviewers only.
hide = ["private"]

[commands]
# Public setup command. Keep this minimal and make it work from the repo root.
setup = "bash .shipd/public/setup.sh"

# Private evaluator command. This checks the final solver output.
verify = "python .shipd/private/hidden_tests/verifier.py"

# Private reference solution patch. Reviewers use this to prove the task is solvable.
apply_reference = "git apply .shipd/private/reference.patch"

[rubrics]
# Reviewer scoring rubric.
rubric_tree = ".shipd/rubrics/rubric_tree.yaml"

[outputs]
# Files a solver should produce by the end of the task.
required = ["metrics.json", "report.md"]
