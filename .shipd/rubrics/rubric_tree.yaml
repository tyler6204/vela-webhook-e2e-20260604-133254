# Reviewer scoring rubric.
# Edit the labels and points so they match your task. Points should add up to 10.
rubric:
  label: "Task"
  children:
    - label: "Understands the problem"
      points: 3
      children:
        - label: "Explains the actual bug or missing feature"
          points: 2
        - label: "Explains why the chosen approach should work"
          points: 1
    - label: "Correct implementation"
      points: 4
      children:
        - label: "Fixes or implements the requested behavior"
          points: 3
        - label: "Does not break existing public behavior"
          points: 1
    - label: "Evidence"
      points: 2
      children:
        - label: "Adds or updates a meaningful test"
          points: 1
        - label: "Provides required metrics or report output"
          points: 1
    - label: "Communication"
      points: 1
      children:
        - label: "report.md is concise and reproducible"
          points: 1
